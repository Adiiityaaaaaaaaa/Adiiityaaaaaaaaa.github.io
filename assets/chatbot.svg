<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">AI Chatbot Console — live production traffic</text>

  <!-- conversation -->
  <rect x="20" y="56" width="440" height="424" rx="10" fill="#121a2c"/>
  <text x="40" y="84" fill="#22d3ee" font-size="12" font-weight="700">LIVE CONVERSATION</text>

  <rect x="40" y="100" width="290" height="44" rx="12" fill="#141b2e" stroke="#1f2940"/>
  <text x="56" y="120" fill="#e8ecf5" font-size="12">Hi, what's my balance and when is my</text>
  <text x="56" y="136" fill="#e8ecf5" font-size="12">next payment due?</text>

  <rect x="130" y="156" width="310" height="60" rx="12" fill="#101c33" stroke="#6366f1"/>
  <text x="146" y="176" fill="#e8ecf5" font-size="12">Your current balance is £3,214.50 and your next</text>
  <text x="146" y="192" fill="#e8ecf5" font-size="12">payment of £220 collects on 28 July. 😊</text>
  <text x="146" y="208" fill="#a5a8ff" font-size="10">🤖 answered from account context · 1.2s</text>

  <rect x="40" y="228" width="290" height="44" rx="12" fill="#141b2e" stroke="#1f2940"/>
  <text x="56" y="248" fill="#e8ecf5" font-size="12">I lost my job and I'm worried about</text>
  <text x="56" y="264" fill="#e8ecf5" font-size="12">keeping up with payments…</text>

  <rect x="130" y="284" width="310" height="76" rx="12" fill="#101c33" stroke="#fbbf24"/>
  <text x="146" y="304" fill="#e8ecf5" font-size="12">I'm really sorry to hear that. Money worries are</text>
  <text x="146" y="320" fill="#e8ecf5" font-size="12">serious — I'm connecting you with a specialist</text>
  <text x="146" y="336" fill="#e8ecf5" font-size="12">from our team who can help with options.</text>
  <text x="146" y="352" fill="#fbbf24" font-size="10">⚠ vulnerability detected → human handoff</text>

  <rect x="40" y="376" width="250" height="30" rx="15" fill="#34d399" opacity="0.15" stroke="#34d399"/>
  <text x="56" y="396" fill="#34d399" font-size="11">👤 Agent Sarah joined the conversation</text>

  <rect x="40" y="428" width="330" height="34" rx="17" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="56" y="450" fill="#93a0b8" font-size="12">Customer is typing…</text>

  <!-- analytics panel -->
  <rect x="480" y="56" width="300" height="212" rx="10" fill="#121a2c"/>
  <text x="500" y="84" fill="#22d3ee" font-size="12" font-weight="700">INTENT PIPELINE</text>
  <g font-size="11">
    <text x="500" y="112" fill="#e8ecf5">balance_enquiry</text>
    <rect x="640" y="102" width="90" height="12" rx="6" fill="#1f2940"/>
    <rect x="640" y="102" width="86" height="12" rx="6" fill="#34d399"/>
    <text x="740" y="112" fill="#93a0b8">0.96</text>

    <text x="500" y="140" fill="#e8ecf5">payment_date</text>
    <rect x="640" y="130" width="90" height="12" rx="6" fill="#1f2940"/>
    <rect x="640" y="130" width="81" height="12" rx="6" fill="#34d399"/>
    <text x="740" y="140" fill="#93a0b8">0.90</text>

    <text x="500" y="168" fill="#e8ecf5">financial_difficulty</text>
    <rect x="640" y="158" width="90" height="12" rx="6" fill="#1f2940"/>
    <rect x="640" y="158" width="88" height="12" rx="6" fill="#fbbf24"/>
    <text x="740" y="168" fill="#93a0b8">0.98</text>
  </g>
  <text x="500" y="200" fill="#93a0b8" font-size="11">Guardrail: vulnerable-customer intents</text>
  <text x="500" y="218" fill="#93a0b8" font-size="11">always route to a human agent.</text>
  <rect x="500" y="232" width="180" height="22" rx="11" fill="#fbbf24" opacity="0.15"/>
  <text x="590" y="247" fill="#fbbf24" font-size="11" text-anchor="middle">handoff policy: ACTIVE</text>

  <!-- stats -->
  <rect x="480" y="284" width="300" height="196" rx="10" fill="#121a2c"/>
  <text x="500" y="312" fill="#22d3ee" font-size="12" font-weight="700">TODAY</text>
  <text x="500" y="344" fill="#e8ecf5" font-size="24" font-weight="800">312</text>
  <text x="500" y="362" fill="#93a0b8" font-size="10">conversations handled</text>
  <text x="640" y="344" fill="#34d399" font-size="24" font-weight="800">71%</text>
  <text x="640" y="362" fill="#93a0b8" font-size="10">resolved without an agent</text>
  <text x="500" y="404" fill="#22d3ee" font-size="24" font-weight="800">1.4s</text>
  <text x="500" y="422" fill="#93a0b8" font-size="10">median response time</text>
  <text x="640" y="404" fill="#e8ecf5" font-size="24" font-weight="800">4.7★</text>
  <text x="640" y="422" fill="#93a0b8" font-size="10">customer rating</text>
  <text x="500" y="458" fill="#93a0b8" font-size="10">OpenAI · monitored + logged end-to-end</text>
</svg>
