<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Live Motorsport Centre — Race Day</text>

  <!-- live banner -->
  <rect x="20" y="56" width="500" height="60" rx="10" fill="#141b2e" stroke="#1f2940"/>
  <circle cx="48" cy="86" r="7" fill="#f87171">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="66" y="80" fill="#e8ecf5" font-size="15" font-weight="800">LIVE · GRAND PRIX — LAP 42/57</text>
  <text x="66" y="102" fill="#93a0b8" font-size="11">Sector times updating every 200ms</text>

  <!-- concurrent users tile -->
  <rect x="540" y="56" width="240" height="60" rx="10" fill="#141b2e" stroke="#22d3ee"/>
  <text x="560" y="80" fill="#93a0b8" font-size="10">CONCURRENT USERS</text>
  <text x="560" y="106" fill="#22d3ee" font-size="24" font-weight="800">2.4M</text>
  <polyline points="660,102 675,96 690,99 705,90 720,92 735,82 750,85 765,74"
            fill="none" stroke="#22d3ee" stroke-width="2"/>

  <!-- timing table -->
  <rect x="20" y="132" width="500" height="348" rx="10" fill="#121a2c"/>
  <text x="40" y="160" fill="#22d3ee" font-size="12" font-weight="700">LIVE TIMING</text>
  <g font-size="12">
    <text x="40" y="188" fill="#93a0b8">POS</text><text x="100" y="188" fill="#93a0b8">CAR</text>
    <text x="250" y="188" fill="#93a0b8">LAST LAP</text><text x="380" y="188" fill="#93a0b8">GAP</text>
  </g>
  <line x1="40" y1="198" x2="500" y2="198" stroke="#1f2940"/>
  <g font-size="13">
    <text x="40" y="226" fill="#fbbf24" font-weight="800">P1</text><text x="100" y="226" fill="#e8ecf5">Car 07 · Team A</text>
    <text x="250" y="226" fill="#a5f3c8" font-family="Consolas, monospace">1:32.408</text><text x="380" y="226" fill="#93a0b8">—</text>
    <text x="40" y="258" fill="#e8ecf5" font-weight="800">P2</text><text x="100" y="258" fill="#e8ecf5">Car 12 · Team B</text>
    <text x="250" y="258" fill="#e8ecf5" font-family="Consolas, monospace">1:32.771</text><text x="380" y="258" fill="#93a0b8">+1.204</text>
    <text x="40" y="290" fill="#e8ecf5" font-weight="800">P3</text><text x="100" y="290" fill="#e8ecf5">Car 33 · Team C</text>
    <text x="250" y="290" fill="#c084fc" font-family="Consolas, monospace">1:32.104</text><text x="380" y="290" fill="#93a0b8">+3.882</text>
    <text x="40" y="322" fill="#e8ecf5" font-weight="800">P4</text><text x="100" y="322" fill="#e8ecf5">Car 04 · Team B</text>
    <text x="250" y="322" fill="#e8ecf5" font-family="Consolas, monospace">1:33.019</text><text x="380" y="322" fill="#93a0b8">+7.115</text>
    <text x="40" y="354" fill="#e8ecf5" font-weight="800">P5</text><text x="100" y="354" fill="#e8ecf5">Car 21 · Team D</text>
    <text x="250" y="354" fill="#e8ecf5" font-family="Consolas, monospace">1:33.284</text><text x="380" y="354" fill="#93a0b8">+11.40</text>
  </g>
  <text x="40" y="400" fill="#93a0b8" font-size="11">⚡ purple = fastest lap · cached reads via Redis</text>
  <rect x="40" y="420" width="440" height="40" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="56" y="445" fill="#93a0b8" font-size="11" font-family="Consolas, monospace">GET /livetiming · p99 38ms · cache hit 99.2%</text>

  <!-- match centre panel -->
  <rect x="540" y="132" width="240" height="348" rx="10" fill="#121a2c"/>
  <text x="560" y="160" fill="#22d3ee" font-size="12" font-weight="700">MATCH CENTRE</text>
  <rect x="560" y="176" width="200" height="80" rx="8" fill="#141b2e" stroke="#1f2940"/>
  <text x="660" y="208" fill="#e8ecf5" font-size="22" font-weight="800" text-anchor="middle">2 – 1</text>
  <text x="660" y="230" fill="#93a0b8" font-size="11" text-anchor="middle">Home vs Away · 78'</text>
  <rect x="560" y="268" width="200" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
  <text x="574" y="290" fill="#e8ecf5" font-size="11">⚽ GOAL — 76' · #9</text>
  <text x="574" y="308" fill="#93a0b8" font-size="10">pushed to 1.8M subscribers</text>
  <rect x="560" y="332" width="200" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
  <text x="574" y="354" fill="#e8ecf5" font-size="11">🟨 Yellow card — 74' · #5</text>
  <text x="574" y="372" fill="#93a0b8" font-size="10">event latency 220ms</text>
  <text x="560" y="420" fill="#93a0b8" font-size="11">AWS · EC2 + RDS + CloudWatch</text>
  <text x="560" y="440" fill="#93a0b8" font-size="11">PostgreSQL · indexed + cached</text>
</svg>
