<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Open Banking VRP — Event Flow</text>

  <!-- consent card -->
  <rect x="20" y="56" width="360" height="128" rx="10" fill="#141b2e" stroke="#1f2940"/>
  <text x="40" y="84" fill="#22d3ee" font-size="12" font-weight="700">VRP CONSENT</text>
  <text x="40" y="110" fill="#e8ecf5" font-size="13">Sweep up to £220.00 / month</text>
  <text x="40" y="132" fill="#93a0b8" font-size="12">Bank: ●●●● 4821 · valid until Mar 2027</text>
  <rect x="40" y="146" width="96" height="24" rx="12" fill="#34d399" opacity="0.2"/>
  <text x="88" y="162" fill="#34d399" font-size="12" text-anchor="middle" font-weight="700">AUTHORISED</text>

  <!-- schedule -->
  <rect x="20" y="200" width="360" height="280" rx="10" fill="#121a2c"/>
  <text x="40" y="228" fill="#22d3ee" font-size="12" font-weight="700">COLLECTION SCHEDULE</text>
  <g font-size="11" fill="#93a0b8">
    <text x="40" y="258">Jan</text><text x="40" y="296">Feb</text><text x="40" y="334">Mar</text><text x="40" y="372">Apr</text><text x="40" y="410">May</text>
  </g>
  <rect x="80" y="246" width="220" height="16" rx="8" fill="#34d399" opacity="0.7"/>
  <rect x="80" y="284" width="220" height="16" rx="8" fill="#34d399" opacity="0.7"/>
  <rect x="80" y="322" width="220" height="16" rx="8" fill="#34d399" opacity="0.7"/>
  <rect x="80" y="360" width="150" height="16" rx="8" fill="#fbbf24" opacity="0.75"/>
  <rect x="80" y="398" width="220" height="16" rx="8" fill="#1f2940"/>
  <text x="310" y="259" fill="#34d399" font-size="11">✓ £220</text>
  <text x="310" y="297" fill="#34d399" font-size="11">✓ £220</text>
  <text x="310" y="335" fill="#34d399" font-size="11">✓ £220</text>
  <text x="240" y="373" fill="#fbbf24" font-size="11">retry · funds check</text>
  <text x="310" y="411" fill="#93a0b8" font-size="11">scheduled</text>

  <!-- event stream -->
  <rect x="400" y="56" width="380" height="424" rx="10" fill="#121a2c"/>
  <text x="420" y="84" fill="#22d3ee" font-size="12" font-weight="700">INTEGRATION EVENTS</text>
  <g font-family="Consolas, monospace" font-size="11">
    <rect x="420" y="98" width="340" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="434" y="118" fill="#a5a8ff">VrpConsentAuthorised · v1</text>
    <text x="434" y="136" fill="#93a0b8">{ consentId, maxAmount, sweepAccount }</text>

    <rect x="420" y="158" width="340" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="434" y="178" fill="#a5a8ff">PaymentPlanCreated · v1</text>
    <text x="434" y="196" fill="#93a0b8">{ planId, schedule[5], applicationId }</text>

    <rect x="420" y="218" width="340" height="52" rx="8" fill="#141b2e" stroke="#22d3ee"/>
    <text x="434" y="238" fill="#22d3ee">AccountDisbursed · v2  ← new</text>
    <text x="434" y="256" fill="#93a0b8">{ accountId, lmsReference, amount }</text>

    <rect x="420" y="278" width="340" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="434" y="298" fill="#a5a8ff">FundsCheckCompleted · v1</text>
    <text x="434" y="316" fill="#93a0b8">{ consentId, sufficient: true }</text>

    <rect x="420" y="338" width="340" height="52" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="434" y="358" fill="#a5a8ff">PaymentCollected · v1</text>
    <text x="434" y="376" fill="#93a0b8">{ planId, instalment: 3, amount: 220.00 }</text>
  </g>
  <text x="420" y="424" fill="#93a0b8" font-size="11">3 services · 2 background jobs · MongoDB</text>
  <text x="420" y="446" fill="#93a0b8" font-size="11">consent → acquisition → collection → disbursal</text>
</svg>
