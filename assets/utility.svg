<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">UtilityService — founded from scratch · Link Shortener built in a day</text>

  <!-- link shortener UI -->
  <rect x="20" y="56" width="370" height="200" rx="10" fill="#121a2c"/>
  <text x="40" y="84" fill="#22d3ee" font-size="12" font-weight="700">LINK SHORTENER</text>
  <rect x="40" y="98" width="330" height="36" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="54" y="121" fill="#93a0b8" font-size="11" font-family="Consolas, monospace">https://…/journey/repayments?applicationId=…</text>
  <rect x="40" y="144" width="110" height="30" rx="15" fill="#6366f1"/>
  <text x="95" y="164" fill="#fff" font-size="12" text-anchor="middle" font-weight="700">Shorten</text>
  <rect x="40" y="188" width="330" height="48" rx="8" fill="#141b2e" stroke="#34d399"/>
  <text x="54" y="208" fill="#34d399" font-size="13" font-family="Consolas, monospace">link.xyz/a8Xk2Pq</text>
  <text x="54" y="226" fill="#93a0b8" font-size="10">base62 · collision retry · 302 redirect · Mongo-backed</text>

  <!-- api -->
  <rect x="20" y="272" width="370" height="208 " rx="10" fill="#121a2c"/>
  <text x="40" y="300" fill="#22d3ee" font-size="12" font-weight="700">SERVICE API</text>
  <g font-family="Consolas, monospace" font-size="11">
    <rect x="40" y="314" width="330" height="28" rx="6" fill="#141b2e"/>
    <text x="52" y="332" fill="#34d399">POST</text><text x="96" y="332" fill="#e8ecf5">/icenet-bulk-actions → 202 + jobId</text>
    <rect x="40" y="348" width="330" height="28" rx="6" fill="#141b2e"/>
    <text x="52" y="366" fill="#22d3ee">GET</text><text x="96" y="366" fill="#e8ecf5">/icenet-bulk-actions/{jobId}</text>
    <rect x="40" y="382" width="330" height="28" rx="6" fill="#141b2e"/>
    <text x="52" y="400" fill="#34d399">POST</text><text x="96" y="400" fill="#e8ecf5">/api/links</text>
    <rect x="40" y="416" width="330" height="28" rx="6" fill="#141b2e"/>
    <text x="52" y="434" fill="#22d3ee">GET</text><text x="96" y="434" fill="#e8ecf5">/{code} → 302</text>
  </g>
  <text x="40" y="466" fill="#93a0b8" font-size="10">host-split via Istio VirtualServices: link.api.* vs utilityservice.api.*</text>

  <!-- re-architecture timeline -->
  <rect x="410" y="56" width="370" height="424" rx="10" fill="#121a2c"/>
  <text x="430" y="84" fill="#22d3ee" font-size="12" font-weight="700">RE-ARCHITECTURE TO PLATFORM STANDARD</text>
  <line x1="444" y1="104" x2="444" y2="420" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

  <circle cx="444" cy="116" r="7" fill="#34d399"/>
  <text x="464" y="112" fill="#e8ecf5" font-size="12" font-weight="700">Phase 1 — Layered solution</text>
  <text x="464" y="130" fill="#93a0b8" font-size="11">Domain / Application / Persistence /</text>
  <text x="464" y="146" fill="#93a0b8" font-size="11">Infrastructure split, zero behaviour change</text>

  <circle cx="444" cy="180" r="7" fill="#34d399"/>
  <text x="464" y="176" fill="#e8ecf5" font-size="12" font-weight="700">Phase 2 — CQRS + MediatR</text>
  <text x="464" y="194" fill="#93a0b8" font-size="11">platform Cqrs.MediatR layer, commands,</text>
  <text x="464" y="210" fill="#93a0b8" font-size="11">queries, Result-typed handlers</text>

  <circle cx="444" cy="244" r="7" fill="#34d399"/>
  <text x="464" y="240" fill="#e8ecf5" font-size="12" font-weight="700">Phase 3 — Platform host</text>
  <text x="464" y="258" fill="#93a0b8" font-size="11">SequensisServiceBuilder, versioned</text>
  <text x="464" y="274" fill="#93a0b8" font-size="11">controllers, OpenTelemetry, HPA/PDB charts</text>

  <circle cx="444" cy="308" r="7" fill="#34d399"/>
  <text x="464" y="304" fill="#e8ecf5" font-size="12" font-weight="700">Phase 4 — SDK + events</text>
  <text x="464" y="322" fill="#93a0b8" font-size="11">typed UtilityService.Sdk client, PubSub</text>
  <text x="464" y="338" fill="#93a0b8" font-size="11">BulkActionJobCompletedEvent publishing</text>

  <circle cx="444" cy="372" r="7" fill="#22d3ee"/>
  <text x="464" y="368" fill="#e8ecf5" font-size="12" font-weight="700">Mesh auth</text>
  <text x="464" y="386" fill="#93a0b8" font-size="11">Istio AuthorizationPolicies as the sole</text>
  <text x="464" y="402" fill="#93a0b8" font-size="11">authority — in-app JWT removed</text>

  <rect x="430" y="428" width="330" height="36" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="446" y="451" fill="#93a0b8" font-size="11" font-family="Consolas, monospace">.NET 8 · MongoDB · Helm · foreman.json</text>
</svg>
