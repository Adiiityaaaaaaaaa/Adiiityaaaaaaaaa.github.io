  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Loan Application — Repayment Setup</text>

  <!-- stepper -->
  <g>
    <circle cx="200" cy="76" r="14" fill="#34d399"/><text x="200" y="81" fill="#0b0f1a" font-size="12" text-anchor="middle" font-weight="700">✓</text>
    <rect x="214" y="74" width="80" height="4" fill="#34d399"/>
    <circle cx="308" cy="76" r="14" fill="#34d399"/><text x="308" y="81" fill="#0b0f1a" font-size="12" text-anchor="middle" font-weight="700">✓</text>
    <rect x="322" y="74" width="80" height="4" fill="#34d399"/>
    <circle cx="416" cy="76" r="14" fill="#6366f1"/><text x="416" y="81" fill="#fff" font-size="12" text-anchor="middle" font-weight="700">3</text>
    <rect x="430" y="74" width="80" height="4" fill="#1f2940"/>
    <circle cx="524" cy="76" r="14" fill="#1f2940"/><text x="524" y="81" fill="#93a0b8" font-size="12" text-anchor="middle">4</text>
    <rect x="538" y="74" width="80" height="4" fill="#1f2940"/>
    <circle cx="632" cy="76" r="14" fill="#1f2940"/><text x="632" y="81" fill="#93a0b8" font-size="12" text-anchor="middle">5</text>
  </g>
  <g font-size="10" fill="#93a0b8" text-anchor="middle">
    <text x="200" y="106">Details</text>
    <text x="308" y="106">Offer</text>
    <text x="416" y="106" fill="#e8ecf5">Repayments</text>
    <text x="524" y="106">Confirm</text>
    <text x="632" y="106">Done</text>
  </g>

  <!-- form card -->
  <rect x="170" y="126" width="460" height="344" rx="14" fill="#141b2e" stroke="#1f2940"/>
  <text x="200" y="162" fill="#e8ecf5" font-size="18" font-weight="800">Set up your repayments</text>
  <text x="200" y="184" fill="#93a0b8" font-size="12">Connect your bank to pay automatically with Open Banking</text>

  <text x="200" y="216" fill="#93a0b8" font-size="11">MONTHLY PAYMENT</text>
  <rect x="200" y="224" width="400" height="40" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="216" y="249" fill="#e8ecf5" font-size="14" font-weight="700">£220.00 · collected on the 28th</text>

  <text x="200" y="290" fill="#93a0b8" font-size="11">YOUR BANK</text>
  <rect x="200" y="298" width="400" height="44" rx="8" fill="#0b0f1a" stroke="#6366f1"/>
  <circle cx="224" cy="320" r="12" fill="#6366f1" opacity="0.5"/>
  <text x="246" y="325" fill="#e8ecf5" font-size="13">Personal current account ●●●● 4821</text>
  <text x="580" y="325" fill="#34d399" font-size="12" text-anchor="end">verified ✓</text>

  <rect x="200" y="356" width="400" height="52" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <rect x="212" y="368" width="16" height="16" rx="4" fill="#6366f1"/>
  <text x="221" y="381" fill="#fff" font-size="11" text-anchor="middle">✓</text>
  <text x="240" y="376" fill="#e8ecf5" font-size="11">I authorise variable recurring payments up to my</text>
  <text x="240" y="392" fill="#e8ecf5" font-size="11">agreed monthly amount, as shown above.</text>

  <rect x="200" y="422" width="400" height="40" rx="20" fill="#6366f1"/>
  <text x="400" y="447" fill="#fff" font-size="14" text-anchor="middle" font-weight="700">Continue to your bank →</text>
