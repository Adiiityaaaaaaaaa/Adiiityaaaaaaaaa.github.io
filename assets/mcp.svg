<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Loan Advisor — AI assistant over the loan journey API</text>

  <!-- endpoints -->
  <rect x="20" y="56" width="300" height="424" rx="10" fill="#121a2c"/>
  <text x="40" y="84" fill="#22d3ee" font-size="12" font-weight="700">MCP TOOLS / OPENAPI · 14 endpoints</text>
  <g font-family="Consolas, monospace" font-size="11">
    <rect x="36" y="98" width="268" height="30" rx="6" fill="#141b2e"/>
    <text x="48" y="117" fill="#34d399">POST</text><text x="90" y="117" fill="#e8ecf5">/applications</text>
    <rect x="36" y="134" width="268" height="30" rx="6" fill="#141b2e"/>
    <text x="48" y="153" fill="#22d3ee">GET</text><text x="90" y="153" fill="#e8ecf5">/applications/{id}</text>
    <rect x="36" y="170" width="268" height="30" rx="6" fill="#141b2e"/>
    <text x="48" y="189" fill="#34d399">POST</text><text x="90" y="189" fill="#e8ecf5">/quote</text>
    <rect x="36" y="206" width="268" height="30" rx="6" fill="#141b2e" stroke="#6366f1"/>
    <text x="48" y="225" fill="#34d399">POST</text><text x="90" y="225" fill="#e8ecf5">/offer/accept</text>
    <rect x="36" y="242" width="268" height="30" rx="6" fill="#141b2e"/>
    <text x="48" y="261" fill="#34d399">POST</text><text x="90" y="261" fill="#e8ecf5">/vrp/{id}/setup</text>
    <rect x="36" y="278" width="268" height="30" rx="6" fill="#141b2e"/>
    <text x="48" y="297" fill="#22d3ee">GET</text><text x="90" y="297" fill="#e8ecf5">/journey/next-step</text>
  </g>
  <text x="40" y="340" fill="#93a0b8" font-size="11">FastAPI · OpenAPI 3 schema</text>
  <text x="40" y="360" fill="#93a0b8" font-size="11">exposed via MCP + Custom GPT</text>

  <!-- chat -->
  <rect x="340" y="56" width="440" height="424" rx="10" fill="#121a2c"/>
  <text x="360" y="84" fill="#22d3ee" font-size="12" font-weight="700">LOAN ADVISOR CHAT</text>

  <rect x="440" y="98" width="320" height="44" rx="12" fill="#1f2940"/>
  <text x="456" y="118" fill="#e8ecf5" font-size="12">I’d like to borrow £5,000 over 3 years —</text>
  <text x="456" y="134" fill="#e8ecf5" font-size="12">what would that cost me monthly?</text>

  <rect x="360" y="154" width="260" height="26" rx="13" fill="#6366f1" opacity="0.18" stroke="#6366f1"/>
  <text x="374" y="171" fill="#a5a8ff" font-size="11" font-family="Consolas, monospace">⚙ calling POST /quote…</text>

  <rect x="360" y="192" width="360" height="76" rx="12" fill="#141b2e" stroke="#1f2940"/>
  <text x="376" y="214" fill="#e8ecf5" font-size="12">Based on a soft check, you could borrow £5,000</text>
  <text x="376" y="232" fill="#e8ecf5" font-size="12">over 36 months at ~£178/month.</text>
  <text x="376" y="254" fill="#93a0b8" font-size="11">This won’t affect your credit score.</text>

  <rect x="440" y="280" width="320" height="26" rx="13" fill="#1f2940"/>
  <text x="456" y="297" fill="#e8ecf5" font-size="12">Great — let’s continue with the application</text>

  <rect x="360" y="318" width="290" height="26" rx="13" fill="#6366f1" opacity="0.18" stroke="#6366f1"/>
  <text x="374" y="335" fill="#a5a8ff" font-size="11" font-family="Consolas, monospace">⚙ calling POST /applications…</text>

  <rect x="360" y="356" width="360" height="56" rx="12" fill="#141b2e" stroke="#22d3ee"/>
  <text x="376" y="378" fill="#e8ecf5" font-size="12">Application started ✓ — next step is income</text>
  <text x="376" y="396" fill="#e8ecf5" font-size="12">verification. Ready when you are.</text>

  <rect x="360" y="430" width="330" height="34" rx="17" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="376" y="452" fill="#93a0b8" font-size="12">Message Loan Advisor…</text>
  <circle cx="740" cy="447" r="17" fill="#6366f1"/>
  <text x="740" y="453" fill="#fff" font-size="12" text-anchor="middle">➤</text>
</svg>
