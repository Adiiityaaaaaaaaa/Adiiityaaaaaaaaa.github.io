<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Servicing Hub — WhatsApp Conversations</text>

  <!-- conversation list -->
  <rect x="0" y="36" width="230" height="464" fill="#121a2c"/>
  <rect x="14" y="54" width="202" height="30" rx="15" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="28" y="74" fill="#93a0b8" font-size="12">🔍 Search conversations</text>

  <rect x="8" y="96" width="214" height="58" rx="10" fill="#6366f1" opacity="0.15"/>
  <circle cx="34" cy="125" r="14" fill="#22d3ee" opacity="0.5"/>
  <text x="58" y="118" fill="#e8ecf5" font-size="12" font-weight="700">S. Walker</text>
  <text x="58" y="136" fill="#93a0b8" font-size="11">Thanks, that worked! 🎉</text>
  <circle cx="206" cy="112" r="4" fill="#34d399"/>

  <circle cx="34" cy="187" r="14" fill="#6366f1" opacity="0.5"/>
  <text x="58" y="180" fill="#e8ecf5" font-size="12" font-weight="700">J. Ahmed</text>
  <text x="58" y="198" fill="#93a0b8" font-size="11">When is my next payment…</text>

  <circle cx="34" cy="245" r="14" fill="#fbbf24" opacity="0.5"/>
  <text x="58" y="238" fill="#e8ecf5" font-size="12" font-weight="700">M. O’Brien</text>
  <text x="58" y="256" fill="#93a0b8" font-size="11">🤖 bot handling · payment date</text>

  <!-- chat pane -->
  <text x="250" y="70" fill="#e8ecf5" font-size="13" font-weight="700">S. Walker</text>
  <rect x="330" y="54" width="86" height="20" rx="10" fill="#34d399" opacity="0.15"/>
  <text x="373" y="68" fill="#34d399" font-size="11" text-anchor="middle">● bot active</text>

  <!-- inbound bubble -->
  <rect x="250" y="92" width="330" height="46" rx="12" fill="#141b2e" stroke="#1f2940"/>
  <text x="266" y="112" fill="#e8ecf5" font-size="12">Hi, can I change my payment date to the</text>
  <text x="266" y="128" fill="#e8ecf5" font-size="12">28th? I get paid at the end of the month</text>

  <!-- bot bubble -->
  <rect x="360" y="150" width="420" height="62" rx="12" fill="#0e3b2e"/>
  <text x="376" y="170" fill="#a7f3d0" font-size="12">Of course! I can move your collection date to the</text>
  <text x="376" y="186" fill="#a7f3d0" font-size="12">28th starting next month. Shall I confirm that?</text>
  <text x="376" y="204" fill="#5eead4" font-size="10">🤖 AI assistant · 14:02 ✓✓</text>

  <rect x="250" y="224" width="120" height="40" rx="12" fill="#141b2e" stroke="#1f2940"/>
  <text x="266" y="248" fill="#e8ecf5" font-size="12">Yes please 👍</text>

  <rect x="360" y="276" width="420" height="62" rx="12" fill="#0e3b2e"/>
  <text x="376" y="296" fill="#a7f3d0" font-size="12">Done! Your payments will now collect on the 28th.</text>
  <text x="376" y="312" fill="#a7f3d0" font-size="12">You’ll get a confirmation message shortly. 📄</text>
  <text x="376" y="330" fill="#5eead4" font-size="10">🤖 AI assistant · 14:03 ✓✓</text>

  <!-- agent panel -->
  <rect x="250" y="352" width="530" height="70" rx="10" fill="#121a2c" stroke="#1f2940"/>
  <text x="266" y="376" fill="#22d3ee" font-size="11" font-weight="700">AGENT PANEL — real-time via SignalR</text>
  <text x="266" y="396" fill="#93a0b8" font-size="11">Intent: change_payment_date (0.96) · Sentiment: positive · Handoff: not needed</text>
  <rect x="266" y="404" width="100" height="4" rx="2" fill="#34d399"/>

  <!-- composer -->
  <rect x="250" y="438" width="440" height="40" rx="20" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="270" y="463" fill="#93a0b8" font-size="12">Take over conversation…</text>
  <circle cx="740" cy="458" r="20" fill="#6366f1"/>
  <text x="740" y="464" fill="#fff" font-size="14" text-anchor="middle">➤</text>
</svg>
