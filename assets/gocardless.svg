<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="500" rx="12" fill="#0f1524"/>
  <rect width="800" height="36" rx="12" fill="#1a2338"/>
  <rect y="24" width="800" height="12" fill="#1a2338"/>
  <circle cx="22" cy="18" r="5" fill="#f87171"/><circle cx="40" cy="18" r="5" fill="#fbbf24"/><circle cx="58" cy="18" r="5" fill="#34d399"/>
  <text x="400" y="23" fill="#93a0b8" font-size="12" text-anchor="middle">Payments Service — Direct Debit Webhooks &amp; Mandate Import</text>

  <!-- webhook stream -->
  <rect x="20" y="56" width="380" height="424" rx="10" fill="#121a2c"/>
  <text x="40" y="84" fill="#22d3ee" font-size="12" font-weight="700">WEBHOOK EVENTS — HMAC-SHA256 verified ✓</text>
  <g font-family="Consolas, monospace" font-size="11">
    <rect x="40" y="98" width="340" height="48" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="54" y="118" fill="#a5a8ff">mandate.submitted → Submit()</text>
    <text x="54" y="134" fill="#93a0b8">aggregate: DirectDebitMandate · dedup ✓</text>

    <rect x="40" y="154" width="340" height="48" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="54" y="174" fill="#34d399">mandate.active → Activate()</text>
    <text x="54" y="190" fill="#93a0b8">synced to CMS via Pub/Sub event</text>

    <rect x="40" y="210" width="340" height="48" rx="8" fill="#141b2e" stroke="#1f2940"/>
    <text x="54" y="230" fill="#a5a8ff">payment.confirmed → Confirm()</text>
    <text x="54" y="246" fill="#93a0b8">details re-fetched from API (source of truth)</text>

    <rect x="40" y="266" width="340" height="48" rx="8" fill="#141b2e" stroke="#f87171"/>
    <text x="54" y="286" fill="#f87171">payment.charged_back → ChargeBack()</text>
    <text x="54" y="302" fill="#93a0b8">domain event → MediatR dispatch</text>
  </g>
  <text x="40" y="344" fill="#93a0b8" font-size="11">✓ constant-time signature compare</text>
  <text x="40" y="364" fill="#93a0b8" font-size="11">✓ idempotent event store · retry-safe</text>
  <text x="40" y="384" fill="#93a0b8" font-size="11">✓ feature-flagged CQRS pipeline</text>
  <rect x="40" y="404" width="340" height="56" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="54" y="426" fill="#22d3ee" font-size="11" font-family="Consolas, monospace">POST /api/webhooks/gocardless</text>
  <text x="54" y="446" fill="#93a0b8" font-size="11" font-family="Consolas, monospace">202 · event stored · handlers dispatched</text>

  <!-- mandate import -->
  <rect x="420" y="56" width="360" height="424" rx="10" fill="#121a2c"/>
  <text x="440" y="84" fill="#22d3ee" font-size="12" font-weight="700">BULK MANDATE IMPORT — batch #482</text>
  <rect x="440" y="100" width="320" height="64" rx="8" fill="#141b2e" stroke="#1f2940"/>
  <text x="456" y="124" fill="#e8ecf5" font-size="12">12,408 mandates · 3 funders</text>
  <rect x="456" y="136" width="288" height="8" rx="4" fill="#1f2940"/>
  <rect x="456" y="136" width="212" height="8" rx="4" fill="#34d399"/>
  <text x="456" y="158" fill="#93a0b8" font-size="10">9,140 imported · paged 10/pg · Hangfire</text>

  <g font-size="11">
    <text x="440" y="192" fill="#93a0b8">PIPELINE</text>
    <rect x="440" y="202" width="320" height="34" rx="8" fill="#141b2e"/>
    <text x="456" y="224" fill="#34d399">✓ lmsId → customerId resolved via CMS</text>
    <rect x="440" y="242" width="320" height="34" rx="8" fill="#141b2e"/>
    <text x="456" y="264" fill="#34d399">✓ FunderPayeeId assigned per funder</text>
    <rect x="440" y="282" width="320" height="34" rx="8" fill="#141b2e"/>
    <text x="456" y="304" fill="#34d399">✓ dedup by LMS reference</text>
    <rect x="440" y="322" width="320" height="34" rx="8" fill="#141b2e" stroke="#fbbf24"/>
    <text x="456" y="344" fill="#fbbf24">⟳ import job running — per-funder token</text>
  </g>

  <text x="440" y="390" fill="#93a0b8" font-size="11">Batch aggregate tracks status + flow history;</text>
  <text x="440" y="408" fill="#93a0b8" font-size="11">failures recorded with exact pipeline stage.</text>
  <rect x="440" y="424" width="320" height="36" rx="8" fill="#0b0f1a" stroke="#1f2940"/>
  <text x="456" y="447" fill="#93a0b8" font-size="11" font-family="Consolas, monospace">MandateImportBatch · DDD · MongoDB</text>
</svg>
